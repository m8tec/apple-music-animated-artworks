<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Artwork Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md z-10">
        <h1 class="text-3xl font-bold mb-2 text-center text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400">
            Artwork Finder
        </h1>
        <p class="text-gray-400 text-sm mb-6 text-center">Search for Apple Music Animated Artworks</p>

        <form id="searchForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Artist</label>
                <input type="text" id="artistInput" required placeholder="e.g. Gorillaz" 
                       class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-pink-500 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Album</label>
                <input type="text" id="albumInput" required placeholder="e.g. Plastic Beach" 
                       class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-pink-500 transition-colors">
            </div>
            <button type="submit" id="submitBtn" 
                    class="w-full py-3 mt-4 rounded-lg bg-gradient-to-r from-pink-600 to-orange-500 hover:from-pink-500 hover:to-orange-400 font-semibold transition-all transform active:scale-95 flex justify-center items-center gap-2">
                <span>Search</span>
                <svg id="loadingSpinner" class="animate-spin h-5 w-5 hidden text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </form>

        <div id="statusMessage" class="mt-4 text-center text-sm hidden"></div>

        <div id="videoContainer" class="mt-6 hidden rounded-lg overflow-hidden shadow-lg border border-gray-700 relative aspect-square">
            <video id="artworkVideo" class="w-full h-full object-cover" autoplay loop muted playsinline></video>
        </div>
        <a id="rawLink" href="#" target="_blank" class="block mt-4 text-xs text-center text-pink-400 hover:text-pink-300 hidden truncate"></a>
    </div>

    <div id="historyContainer" class="w-full max-w-md mt-6 hidden">
        <h3 class="text-sm font-semibold text-gray-400 mb-3 uppercase tracking-wider pl-2">Live Global Searches</h3>
        <ul id="historyList" class="space-y-2">
            </ul>
    </div>

    <footer class="mt-12 mb-4 text-center text-sm text-gray-500">
        Built with ⚡️ by 
        <a href="https://m8tec.com" target="_blank" rel="noopener noreferrer" 
           class="font-semibold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400 hover:opacity-80 transition-opacity">
            m8tec
        </a>
    </footer>

</body>
</html>
